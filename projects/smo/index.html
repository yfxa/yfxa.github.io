<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA Basin Air Traffic Density</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e14; color: #c8d0dc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

#canvas-container {
  position: absolute;
  inset: 0;
  overflow: hidden;
  background: #0a0e14;
  cursor: grab;
}
#canvas-container.dragging { cursor: grabbing; }
#density-canvas {
  position: absolute;
  transform-origin: 0 0;
}

#zoom-controls {
  position: absolute; bottom: 14px; left: 14px; z-index: 11;
  display: flex; gap: 6px; align-items: center;
}
#zoom-controls button {
  background: rgba(18, 23, 31, 0.85);
  border: 1px solid #2e4060; color: #8ab4ff;
  width: 30px; height: 30px; border-radius: 6px;
  cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
#zoom-controls button:hover { background: #2e4060; }
#zoom-level {
  font-size: 11px; color: #5a7a9a;
  background: rgba(18, 23, 31, 0.85);
  padding: 4px 8px; border-radius: 4px;
  border: 1px solid #2e4060;
}

#sidebar {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 320px;
  background: rgba(18, 23, 31, 0.92);
  backdrop-filter: blur(12px);
  border-left: 1px solid #1e2a3a;
  overflow-y: auto;
  padding: 16px;
  display: flex; flex-direction: column; gap: 16px;
  transition: transform 0.3s ease;
  z-index: 10;
}
#sidebar.collapsed { transform: translateX(100%); }

#sidebar-toggle {
  position: absolute;
  top: 12px; right: 332px;
  z-index: 11;
  background: rgba(18, 23, 31, 0.85);
  border: 1px solid #2e4060;
  color: #8ab4ff;
  width: 32px; height: 32px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: right 0.3s ease;
}
#sidebar-toggle.collapsed { right: 12px; }

.panel {
  background: #1a2130;
  border-radius: 8px;
  padding: 14px;
  border: 1px solid #243044;
}
.panel h3 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #5a7a9a;
  margin-bottom: 10px;
}

.slider-row {
  display: flex; align-items: center; gap: 8px; margin: 6px 0;
}
.slider-row label {
  font-size: 12px; color: #8a9ab0; width: 90px; flex-shrink: 0;
}
.slider-row input[type="range"] {
  flex: 1; height: 4px;
  -webkit-appearance: none; appearance: none;
  background: #2a3a50; border-radius: 2px; outline: none;
}
.slider-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;

}
.slider-row .val {

}

.preset-row {
  display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0;
}
.preset-btn {
  background: #243044; border: 1px solid #2e4060; color: #8ab4ff;
  padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;

/* Type filter */

.cat-row {

#type-list::-webkit-scrollbar-track { background: #0f1520; }

/* Comparison slider */

#compare-label-right { right: 12px; }

<script>
// ============================================================
// DATA & STATE
// ============================================================
let DATA = null;
let basemapImg = null;
const W = 1920, H = 1080;
const canvas = document.getElementById('density-canvas');
const ctx = canvas.getContext('2d');

// Rendering params
let params = {
  detailOpacity: 0.88,
  glowOpacity: 0.19,
  blurRadius: 3,
  detailNormPct: 95,
  glowNormPct: 90,
  pixelSpacing: 1.5,
};

// Compare mode state
let compareMode = false;
let compareX = 0.5; // 0-1, split position
let compareCanvasLeft = null;  // offscreen canvas for left (selected scenario)
let compareCanvasRight = null; // offscreen canvas for right (today)
let DATA_CACHE = {}; // cache loaded scenario data by filename

// Active types (all on by default)
let activeTypes = new Set();
let renderPending = false;

// Zoom/pan state
let zoom = 1;
let panX = 0, panY = 0;
let isDragging = false;
let compareDragging = false;
let dragStartX, dragStartY, panStartX, panStartY;
const container = document.getElementById('canvas-container');

function fitCanvas() {
  // Compute scale to fit 1920x1080 into container
  const cw = container.clientWidth, ch = container.clientHeight;
  const baseScale = Math.min(cw / W, ch / H);
  const totalScale = baseScale * zoom;
  const renderedW = W * totalScale, renderedH = H * totalScale;
  // Center offset
  const cx = (cw - W * baseScale) / 2;
  const cy = (ch - H * baseScale) / 2;
  canvas.style.transform = `translate(${cx + panX}px, ${cy + panY}px) scale(${totalScale})`;
  canvas.style.width = '';
  canvas.style.height = '';
}

function updateZoomLabel() {
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
}

function zoomAt(factor, clientX, clientY) {
  const rect = container.getBoundingClientRect();
  const cw = rect.width, ch = rect.height;
  const baseScale = Math.min(cw / W, ch / H);
  const cx = (cw - W * baseScale) / 2;
  const cy = (ch - H * baseScale) / 2;
  // Mouse position relative to canvas origin before zoom
  const mx = clientX - rect.left - cx - panX;
  const my = clientY - rect.top - cy - panY;
  const oldZoom = zoom;
  zoom = Math.max(0.5, Math.min(20, zoom * factor));
  const ratio = zoom / oldZoom;
  panX = (clientX - rect.left - cx) - mx * ratio;
  panY = (clientY - rect.top - cy) - my * ratio;
  fitCanvas();
  updateZoomLabel();
}

// Mouse wheel zoom
container.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  zoomAt(factor, e.clientX, e.clientY);
}, { passive: false });

// Pan with mouse drag
container.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  if (compareDragging) return;
  isDragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  panStartX = panX; panStartY = panY;
  container.classList.add('dragging');
});
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  panX = panStartX + (e.clientX - dragStartX);
  panY = panStartY + (e.clientY - dragStartY);
  fitCanvas();
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  container.classList.remove('dragging');
});

// Zoom buttons
document.getElementById('zoom-in').addEventListener('click', () => {
  const rect = container.getBoundingClientRect();
  zoomAt(1.4, rect.left + rect.width / 2, rect.top + rect.height / 2);
});
document.getElementById('zoom-out').addEventListener('click', () => {
  const rect = container.getBoundingClientRect();
  zoomAt(1 / 1.4, rect.left + rect.width / 2, rect.top + rect.height / 2);
});
document.getElementById('zoom-reset').addEventListener('click', () => {
  zoom = 1; panX = 0; panY = 0;
  fitCanvas();
  updateZoomLabel();
});

window.addEventListener('resize', fitCanvas);

// ============================================================
// COLORMAPS
// ============================================================
const GRADIENTS = {
  radarbox: {
    name: 'RadarBox',
    stops: [
      { pos: 0, color: [0, 20, 15] },
      { pos: 0.15, color: [0, 100, 25] },
      { pos: 0.3, color: [20, 180, 15] },
      { pos: 0.5, color: [140, 230, 15] },
      { pos: 0.7, color: [240, 255, 10] },
      { pos: 0.85, color: [255, 175, 10] },
      { pos: 1, color: [255, 45, 20] },
    ]
  },
  thermal: {
    name: 'Thermal',
    stops: [
      { pos: 0, color: [0, 0, 30] },
      { pos: 0.2, color: [20, 0, 120] },
      { pos: 0.4, color: [140, 0, 160] },
      { pos: 0.6, color: [220, 50, 50] },
      { pos: 0.8, color: [255, 180, 0] },
      { pos: 1, color: [255, 255, 200] },
    ]
  },
  plasma: {
    name: 'Plasma',
    stops: [
      { pos: 0, color: [13, 8, 135] },
      { pos: 0.25, color: [126, 3, 168] },
      { pos: 0.5, color: [204, 71, 120] },
      { pos: 0.75, color: [248, 149, 64] },
      { pos: 1, color: [240, 249, 33] },
    ]
  },
  viridis: {
    name: 'Viridis',
    stops: [
      { pos: 0, color: [68, 1, 84] },
      { pos: 0.25, color: [59, 82, 139] },
      { pos: 0.5, color: [33, 145, 140] },
      { pos: 0.75, color: [94, 201, 98] },
      { pos: 1, color: [253, 231, 37] },
    ]
  },
  ocean: {
    name: 'Ocean',
    stops: [
      { pos: 0, color: [0, 10, 20] },
      { pos: 0.3, color: [0, 60, 120] },
      { pos: 0.5, color: [0, 140, 180] },
      { pos: 0.7, color: [0, 210, 200] },
      { pos: 0.9, color: [180, 255, 240] },
      { pos: 1, color: [255, 255, 255] },
    ]
  },
};

let currentGradient = 'radarbox';
let customStops = null; // when user edits colors

function getActiveStops() {
  return customStops || GRADIENTS[currentGradient].stops;
}

function colorFromStops(v, stops) {
  v = Math.max(0, Math.min(1, v));
  if (v <= stops[0].pos) return stops[0].color;
  if (v >= stops[stops.length - 1].pos) return stops[stops.length - 1].color;
  for (let i = 0; i < stops.length - 1; i++) {
    if (v >= stops[i].pos && v <= stops[i + 1].pos) {
      const t = (v - stops[i].pos) / (stops[i + 1].pos - stops[i].pos);
      const a = stops[i].color, b = stops[i + 1].color;
      return [
        Math.floor(a[0] + (b[0] - a[0]) * t),
        Math.floor(a[1] + (b[1] - a[1]) * t),
        Math.floor(a[2] + (b[2] - a[2]) * t),
      ];
    }
  }
  return stops[stops.length - 1].color;
}

// ============================================================
// RESIDENTIAL ZONES — real LA City zoning data from ZIMAS/GeoHub
// Grid cells ~200m, sourced from 5,815 parcel polygons
// ============================================================
let showZones = false;
let ZONE_GRID = null; // loaded on demand

async function loadZoneGrid() {
  if (ZONE_GRID) return;
  const resp = await fetch('data/la_residential_grid.json');
  ZONE_GRID = await resp.json();
  console.log(`Loaded zoning grid: ${ZONE_GRID.cells.length} cells, ${ZONE_GRID.stats.totalParcels} parcels`);
}

// Colors: 0=SF (blue), 1=mixed (orange), 2=MF (red)
const ZONE_FILL = [
  'rgba(100, 200, 255, 0.35)',   // SF — blue
  'rgba(255, 180, 60, 0.35)',    // mixed — orange
  'rgba(255, 100, 100, 0.4)',    // MF — red
];

function drawZones(ctx, bounds, mercNorth, mercSouth, latToMercY) {
  if (!ZONE_GRID) return;
  const cs = ZONE_GRID.cellSize;
  const half = cs / 2;

  for (const cell of ZONE_GRID.cells) {
    const lat = cell.lat;
    const lon = cell.lon;

    // Cell corners
    const x0 = ((lon - half - bounds.west) / (bounds.east - bounds.west)) * W;
    const x1 = ((lon + half - bounds.west) / (bounds.east - bounds.west)) * W;
    const mercY0 = latToMercY(lat + half);
    const mercY1 = latToMercY(lat - half);
    const y0 = ((mercNorth - mercY0) / (mercNorth - mercSouth)) * H;
    const y1 = ((mercNorth - mercY1) / (mercNorth - mercSouth)) * H;

    // Alpha based on intensity
    const alpha = 0.15 + cell.i * 0.45;
    const baseColor = ZONE_FILL[cell.d];
    // Override alpha
    const color = baseColor.replace(/[\d.]+\)$/, alpha.toFixed(2) + ')');

    ctx.fillStyle = color;
    ctx.fillRect(x0, y0, x1 - x0, y1 - y0);
  }
}

// ============================================================
// RENDERING
// ============================================================
function render() {
  if (!DATA || !basemapImg) return;
  const t0 = performance.now();

  // Calibrated basemap bounds (from airport calibration)
  const bounds = { north: 34.1741, south: 33.8364, west: -118.884, east: -118.0277 };
  const origin = DATA.origin;

  // Draw basemap
  ctx.drawImage(basemapImg, 0, 0, W, H);

  // Filter flights
  const flights = DATA.flights.filter(f => {
    const t = f.t || 'UNKNOWN';
    return activeTypes.has(t);
  });

  // Mercator projection helper
  const latToMercY = (lat) => Math.log(Math.tan(Math.PI / 4 + lat * Math.PI / 360));
  const mercNorth = latToMercY(bounds.north);
  const mercSouth = latToMercY(bounds.south);

  // Draw residential zones if enabled
  if (showZones) {
    drawZones(ctx, bounds, mercNorth, mercSouth, latToMercY);
  }

  // Build paths as pixel coords (Web Mercator projection)
  const allPaths = [];
  for (const flight of flights) {
    const pts = [];
    for (let i = 0; i < flight.p.length; i += 2) {
      const lat = origin.lat + flight.p[i] / 10000;
      const lon = origin.lon + flight.p[i + 1] / 10000;
      const x = ((lon - bounds.west) / (bounds.east - bounds.west)) * W;
      const y = ((mercNorth - latToMercY(lat)) / (mercNorth - mercSouth)) * H;
      pts.push(x, y);
    }
    allPaths.push(pts);
  }

  // Classify by path length for differential weighting
  const lengths = allPaths.map(pts => {
    let len = 0;
    for (let i = 2; i < pts.length; i += 2) {
      const dx = pts[i] - pts[i - 2], dy = pts[i + 1] - pts[i - 1];
      len += Math.sqrt(dx * dx + dy * dy);
    }
    return len;
  });
  const sortedLens = [...lengths].sort((a, b) => a - b);
  const p20 = sortedLens[Math.floor(sortedLens.length * 0.2)] || 1;
  const p80 = sortedLens[Math.floor(sortedLens.length * 0.8)] || 100;

  // Build density grid
  const detail = new Float32Array(W * H);
  const spacing = params.pixelSpacing;
  let totalSamples = 0;

  for (let fi = 0; fi < allPaths.length; fi++) {
    const pts = allPaths[fi];
    if (pts.length < 4) continue;
    const len = lengths[fi];
    const weight = len < p20 ? 0.3 : len < p80 ? 0.7 : 1.0;

    for (let i = 0; i < pts.length - 2; i += 2) {
      const x0 = pts[i], y0 = pts[i + 1];
      const x1 = pts[i + 2], y1 = pts[i + 3];
      const dx = x1 - x0, dy = y1 - y0;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const steps = Math.max(1, Math.ceil(dist / spacing));

      for (let s = 0; s <= steps; s++) {
        const t = s / steps;
        const px = Math.round(x0 + dx * t);
        const py = Math.round(y0 + dy * t);
        if (px >= 0 && px < W && py >= 0 && py < H) {
          detail[py * W + px] += weight;
          totalSamples++;
        }
      }
    }
  }

  // Build glow grid (downsampled)
  const CELL = 3;
  const dW = Math.ceil(W / CELL);
  const dH = Math.ceil(H / CELL);
  const glowGrid = new Float32Array(dW * dH);

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const v = detail[y * W + x];
      if (v > 0) {
        const gx = Math.floor(x / CELL);
        const gy = Math.floor(y / CELL);
        if (gx < dW && gy < dH) glowGrid[gy * dW + gx] += v;
      }
    }
  }

  // Box blur
  const radius = params.blurRadius;
  for (let p = 0; p < 3; p++) {
    const tmp = new Float32Array(dW * dH);
    for (let y = 0; y < dH; y++) {
      for (let x = 0; x < dW; x++) {
        let sum = 0, count = 0;
        for (let dx = -radius; dx <= radius; dx++) {
          const nx = x + dx;
          if (nx >= 0 && nx < dW) { sum += glowGrid[y * dW + nx]; count++; }
        }
        tmp[y * dW + x] = sum / count;
      }
    }
    for (let y = 0; y < dH; y++) {
      for (let x = 0; x < dW; x++) {
        let sum = 0, count = 0;
        for (let dy = -radius; dy <= radius; dy++) {
          const ny = y + dy;
          if (ny >= 0 && ny < dH) { sum += tmp[ny * dW + x]; count++; }
        }
        glowGrid[y * dW + x] = sum / count;
      }
    }
  }

  // Percentile normalization
  function pctVal(arr, pct) {
    const nonzero = [];
    for (let i = 0; i < arr.length; i++) if (arr[i] > 0) nonzero.push(arr[i]);
    if (nonzero.length === 0) return 1;
    nonzero.sort((a, b) => a - b);
    return nonzero[Math.min(nonzero.length - 1, Math.floor(nonzero.length * pct / 100))] || 1;
  }

  const maxDetail = pctVal(detail, params.detailNormPct);
  const maxGlow = pctVal(glowGrid, params.glowNormPct);

  // Composite onto basemap
  const imgData = ctx.getImageData(0, 0, W, H);
  const pixels = imgData.data;
  const stops = getActiveStops();
  const dOpacity = params.detailOpacity;
  const gOpacity = params.glowOpacity;

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const idx = (y * W + x) * 4;
      const gx = Math.floor(x / CELL);
      const gy = Math.floor(y / CELL);
      const gv = Math.min(1, glowGrid[gy * dW + gx] / maxGlow);
      const dv = Math.min(1, detail[y * W + x] / maxDetail);
      const colorVal = Math.min(1, Math.max(dv, gv * 0.7));
      if (colorVal < 0.003) continue;

      const [r, g, b] = colorFromStops(colorVal, stops);
      const detailAlpha = dv > 0 ? Math.min(0.85, Math.sqrt(dv) * dOpacity) : 0;
      const glowAlpha = gv * gv * gOpacity;
      const alpha = Math.min(1, detailAlpha + glowAlpha);

      pixels[idx]     = Math.min(255, pixels[idx]     + Math.floor(r * alpha));
      pixels[idx + 1] = Math.min(255, pixels[idx + 1] + Math.floor(g * alpha));
      pixels[idx + 2] = Math.min(255, pixels[idx + 2] + Math.floor(b * alpha));
    }
  }

  ctx.putImageData(imgData, 0, 0);
  fitCanvas();

  const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
  document.getElementById('status').textContent =
    `${flights.length} flights | ${(totalSamples/1e6).toFixed(1)}M samples | ${elapsed}s render`;
}

function requestRender() {
  if (renderPending) return;
  renderPending = true;
  requestAnimationFrame(async () => {
    renderPending = false;
    if (compareMode) {
      await refreshCompareCanvases();
      renderCompare();
    } else {
      render();
    }
  });
}

async function refreshCompareCanvases() {
  const selA = document.getElementById('compare-a');
  const selB = document.getElementById('compare-b');
  const fileA = selA.value;
  const fileB = selB.value;

  const dataA = await loadScenarioData(fileA);
  compareCanvasLeft = renderToOffscreen(dataA);

  const dataB = await loadScenarioData(fileB);
  compareCanvasRight = renderToOffscreen(dataB);
}

// ============================================================
// COMPARE MODE
// ============================================================
function renderToOffscreen(data) {
  const saved = DATA;
  DATA = data;

  const offCanvas = document.createElement('canvas');
  offCanvas.width = W;
  offCanvas.height = H;
  const offCtx = offCanvas.getContext('2d');

  // Render to main canvas then copy (activeTypes stays as user set it)
  render();
  offCtx.drawImage(canvas, 0, 0);

  // Restore
  DATA = saved;
  return offCanvas;
}

function renderCompare() {
  if (!compareCanvasLeft || !compareCanvasRight) return;

  // Draw right side (today) fully
  ctx.drawImage(compareCanvasRight, 0, 0);

  // Draw left side (2029) clipped
  const splitPx = Math.round(compareX * W);
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, splitPx, H);
  ctx.clip();
  ctx.drawImage(compareCanvasLeft, 0, 0);
  ctx.restore();

  // Draw split line
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(splitPx, 0);
  ctx.lineTo(splitPx, H);
  ctx.stroke();

  fitCanvas();
}

function updateCompareSliderPosition() {
  const slider = document.getElementById('compare-slider');
  const ctr = document.getElementById('canvas-container');
  const rect = canvas.getBoundingClientRect();

  // Position the slider line at the split point in screen coords
  const screenX = rect.left - ctr.getBoundingClientRect().left + rect.width * compareX;
  const line = document.getElementById('compare-line');
  line.style.left = screenX + 'px';

  // Position labels
  const lblLeft = document.getElementById('compare-label-left');
  const lblRight = document.getElementById('compare-label-right');
  lblLeft.style.left = (screenX - 100) + 'px';
  lblRight.style.left = (screenX + 12) + 'px';
}

function getScenarioLabel(selectEl) {
  return selectEl.options[selectEl.selectedIndex].textContent;
}

function getShortLabel(label) {
  const m = label.match(/\d{4}/);
  return m ? m[0] : label;
}

async function loadScenarioData(filename) {
  if (!DATA_CACHE[filename]) {
    const resp = await fetch('data/' + filename);
    DATA_CACHE[filename] = await resp.json();
  }
  return DATA_CACHE[filename];
}

async function enterCompareMode() {
  compareMode = true;
  const slider = document.getElementById('compare-slider');
  slider.classList.add('active');
  const btn = document.getElementById('compare-btn');
  btn.classList.add('active');
  btn.textContent = 'Exit Compare';

  // Show A/B dropdowns
  document.getElementById('compare-controls').style.display = 'block';

  // Reset zoom for compare
  zoom = 1; panX = 0; panY = 0;
  fitCanvas(); updateZoomLabel();

  await renderCompareFromDropdowns();
}

async function renderCompareFromDropdowns() {
  const loading = document.getElementById('loading');
  const loadStatus = document.getElementById('load-status');

  const selA = document.getElementById('compare-a');
  const selB = document.getElementById('compare-b');
  const fileA = selA.value;
  const fileB = selB.value;
  const labelA = getScenarioLabel(selA);
  const labelB = getScenarioLabel(selB);

  loading.style.display = 'flex';

  loadStatus.textContent = `Rendering ${labelA}...`;
  const dataA = await loadScenarioData(fileA);
  compareCanvasLeft = renderToOffscreen(dataA);

  loadStatus.textContent = `Rendering ${labelB}...`;
  const dataB = await loadScenarioData(fileB);
  compareCanvasRight = renderToOffscreen(dataB);

  // Update slider labels
  document.getElementById('compare-label-left').textContent = getShortLabel(labelA);
  document.getElementById('compare-label-right').textContent = getShortLabel(labelB);

  loading.style.display = 'none';

  compareX = 0.5;
  renderCompare();
  updateCompareSliderPosition();
}

function exitCompareMode() {
  compareMode = false;
  document.getElementById('compare-slider').classList.remove('active');
  const btn = document.getElementById('compare-btn');
  btn.classList.remove('active');
  btn.textContent = 'Compare';
  document.getElementById('compare-controls').style.display = 'none';
  render();
}

// ============================================================
// UI: GRADIENT PRESETS
// ============================================================
function buildGradientUI() {
  const container = document.getElementById('gradient-presets');
  for (const [key, grad] of Object.entries(GRADIENTS)) {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (key === currentGradient ? ' active' : '');
    btn.textContent = grad.name;
    btn.dataset.key = key;
    btn.onclick = () => {
      currentGradient = key;
      customStops = null;
      document.querySelectorAll('#gradient-presets .preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateGradientPreview();
      buildColorStopEditors();
      requestRender();
    };
    container.appendChild(btn);
  }
  updateGradientPreview();
  buildColorStopEditors();
}

function updateGradientPreview() {
  const el = document.getElementById('gradient-preview');
  const stops = getActiveStops();
  const parts = stops.map(s => `rgb(${s.color.join(',')}) ${s.pos * 100}%`);
  el.style.background = `linear-gradient(to right, ${parts.join(', ')})`;
}

function buildColorStopEditors() {
  const container = document.getElementById('color-stops');
  container.innerHTML = '';
  const stops = getActiveStops();
  const labels = ['Low', 'Mid-Lo', 'Mid', 'Mid-Hi', 'High', 'Peak', 'Max'];
  stops.forEach((stop, i) => {
    const row = document.createElement('div');
    row.className = 'color-stop';
    const lbl = document.createElement('label');
    lbl.textContent = labels[i] || `Stop ${i}`;
    const input = document.createElement('input');
    input.type = 'color';
    const hex = '#' + stop.color.map(c => c.toString(16).padStart(2, '0')).join('');
    input.value = hex;
    input.addEventListener('input', () => {
      const r = parseInt(input.value.slice(1, 3), 16);
      const g = parseInt(input.value.slice(3, 5), 16);
      const b = parseInt(input.value.slice(5, 7), 16);
      if (!customStops) customStops = JSON.parse(JSON.stringify(GRADIENTS[currentGradient].stops));
      customStops[i].color = [r, g, b];
      document.querySelectorAll('#gradient-presets .preset-btn').forEach(b => b.classList.remove('active'));
      updateGradientPreview();
      requestRender();
    });
    row.appendChild(lbl);
    row.appendChild(input);
    container.appendChild(row);
  });
}

// ============================================================
// UI: SLIDERS
// ============================================================
function setupSliders() {
  const sliders = [
    { id: 'sl-opacity', vid: 'vl-opacity', key: 'detailOpacity', scale: 100, fmt: v => (v/100).toFixed(2) },
    { id: 'sl-glow', vid: 'vl-glow', key: 'glowOpacity', scale: 100, fmt: v => (v/100).toFixed(2) },
    { id: 'sl-blur', vid: 'vl-blur', key: 'blurRadius', scale: 1, fmt: v => v },
    { id: 'sl-detailpct', vid: 'vl-detailpct', key: 'detailNormPct', scale: 1, fmt: v => v },
    { id: 'sl-glowpct', vid: 'vl-glowpct', key: 'glowNormPct', scale: 1, fmt: v => v },
  ];

  for (const s of sliders) {
    const el = document.getElementById(s.id);
    const vl = document.getElementById(s.vid);
    el.addEventListener('input', () => {
      const v = parseInt(el.value);
      params[s.key] = v / s.scale;
      vl.textContent = s.fmt(v);
      requestRender();
    });
  }
}

// ============================================================
// UI: TYPE FILTER
// ============================================================
function buildTypeFilter() {
  if (!DATA) return;
  const types = DATA.types;

  // Parent categories: manned vs drone
  const mannedCats = [
    { key: 'commercial', label: 'Commercial' },
    { key: 'ga', label: 'GA' },
    { key: 'helicopter', label: 'Helicopter' },
    { key: 'military', label: 'Military' },
    { key: 'other', label: 'Other' },
  ];
  const droneCats = [
    { key: 'drone', label: 'Wing Drone' },
  ];

  function getTypesForCat(catKey) {
    const s = new Set();
    for (const [t, info] of Object.entries(types)) {
      if (info.category === catKey) s.add(t);
    }
    return s;
  }
  function getTypesForParent(parentKey) {
    const cats = parentKey === 'manned' ? mannedCats : droneCats;
    const s = new Set();
    for (const cat of cats) {
      for (const t of getTypesForCat(cat.key)) s.add(t);
    }
    // "other" and "UNKNOWN" go to manned
    if (parentKey === 'manned') {
      for (const [t, info] of Object.entries(types)) {
        if (!['drone'].includes(info.category)) s.add(t);
      }
      s.add('UNKNOWN');
    }
    return s;
  }

  function clearAllActive() {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('filter-all').classList.remove('active');
    document.getElementById('filter-none').classList.remove('active');
  }

  function buildCatButtons(container, cats) {
    container.innerHTML = '';
    for (const cat of cats) {
      const btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.textContent = cat.label;
      btn.onclick = () => {
        clearAllActive();
        btn.classList.add('active');
        activeTypes = getTypesForCat(cat.key);
        updateTypeCheckboxes();
        requestRender();
      };
      container.appendChild(btn);
    }
  }

  buildCatButtons(document.getElementById('cat-buttons-manned'), mannedCats);
  buildCatButtons(document.getElementById('cat-buttons-drone'), droneCats);

  // All / None buttons
  document.getElementById('filter-all').onclick = () => {
    clearAllActive();
    document.getElementById('filter-all').classList.add('active');
    activeTypes = new Set(Object.keys(types));
    activeTypes.add('UNKNOWN');
    updateTypeCheckboxes();
    requestRender();
  };
  document.getElementById('filter-none').onclick = () => {
    clearAllActive();
    document.getElementById('filter-none').classList.add('active');
    activeTypes = new Set();
    updateTypeCheckboxes();
    requestRender();
  };

  // Parent toggle buttons (checkmark = select all in parent)
  document.querySelectorAll('.parent-cat-toggle').forEach(tog => {
    tog.onclick = (e) => {
      e.stopPropagation();
      clearAllActive();
      const parent = tog.dataset.parent;
      const parentTypes = getTypesForParent(parent);
      // Toggle: if all parent types are active, remove them; otherwise add them
      const allOn = [...parentTypes].every(t => activeTypes.has(t));
      if (allOn) {
        for (const t of parentTypes) activeTypes.delete(t);
      } else {
        for (const t of parentTypes) activeTypes.add(t);
      }
      updateTypeCheckboxes();
      requestRender();
    };
  });

  // Collapse/expand parent categories
  document.querySelectorAll('.parent-cat-header').forEach(hdr => {
    hdr.addEventListener('click', (e) => {
      if (e.target.classList.contains('parent-cat-toggle')) return;
      hdr.classList.toggle('collapsed');
      const catRow = hdr.nextElementSibling;
      catRow.style.display = hdr.classList.contains('collapsed') ? 'none' : 'flex';
    });
  });

  // Type list
  renderTypeList('');

  // Search (only attach once)
  const searchEl = document.getElementById('type-search');
  searchEl.value = '';
  if (!searchEl._bound) {
    searchEl.addEventListener('input', (e) => {
      renderTypeList(e.target.value.toUpperCase());
    });
    searchEl._bound = true;
  }
}

function renderTypeList(filter) {
  const container = document.getElementById('type-list');
  container.innerHTML = '';
  const types = DATA.types;

  const sorted = Object.entries(types)
    .sort((a, b) => b[1].count - a[1].count);

  for (const [type, info] of sorted) {
    if (filter && !type.toUpperCase().includes(filter)) continue;

    const row = document.createElement('label');
    row.className = 'type-item';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = activeTypes.has(type);
    cb.dataset.type = type;
    cb.addEventListener('change', () => {
      if (cb.checked) activeTypes.add(type);
      else activeTypes.delete(type);
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      requestRender();
    });
    const name = document.createElement('span');
    name.textContent = type || 'UNKNOWN';
    const count = document.createElement('span');
    count.className = 'count';
    count.textContent = `${info.flights}f / ${(info.count/1000).toFixed(0)}k`;
    row.appendChild(cb);
    row.appendChild(name);
    row.appendChild(count);
    container.appendChild(row);
  }
}

function updateTypeCheckboxes() {
  document.querySelectorAll('#type-list input[type="checkbox"]').forEach(cb => {
    cb.checked = activeTypes.has(cb.dataset.type);
  });
}

// ============================================================
// INIT
// ============================================================
async function loadScenario(filename) {
  const loading = document.getElementById('loading');
  const loadStatus = document.getElementById('load-status');
  loading.style.display = 'flex';
  loadStatus.textContent = 'Loading flight data...';

  const resp = await fetch('data/' + filename);
  DATA = await resp.json();

  // Re-initialize active types (all on)
  activeTypes = new Set(Object.keys(DATA.types));
  activeTypes.add('UNKNOWN');

  buildTypeFilter();

  loading.style.display = 'none';
  render();
}

async function init() {
  const loadStatus = document.getElementById('load-status');

  // Load basemap
  loadStatus.textContent = 'Loading basemap...';
  basemapImg = new Image();
  basemapImg.src = 'basemap.png';
  await new Promise((resolve, reject) => {
    basemapImg.onload = resolve;
    basemapImg.onerror = reject;
  });

  // Load flight data
  loadStatus.textContent = 'Loading flight data (this may take a moment)...';
  const resp = await fetch('data/viewer_data.json');
  DATA = await resp.json();

  // Initialize active types (all on)
  activeTypes = new Set(Object.keys(DATA.types));
  activeTypes.add('UNKNOWN');

  loadStatus.textContent = 'Building UI...';

  buildGradientUI();
  setupSliders();
  buildTypeFilter();

  // Scenario selector
  document.getElementById('scenario-select').addEventListener('change', (e) => {
    if (compareMode) exitCompareMode();
    loadScenario(e.target.value);
  });

  // Zone overlay toggle
  const zoneCheckbox = document.getElementById('show-zones');
  const zoneLegend = document.getElementById('zone-legend');
  zoneCheckbox.addEventListener('change', async () => {
    showZones = zoneCheckbox.checked;
    zoneLegend.style.display = showZones ? 'block' : 'none';
    if (showZones) await loadZoneGrid();
    requestRender();
  });

  // Compare button
  document.getElementById('compare-btn').addEventListener('click', () => {
    if (compareMode) exitCompareMode();
    else enterCompareMode();
  });

  // Compare A/B dropdown changes — re-render when changed during compare mode
  document.getElementById('compare-a').addEventListener('change', () => {
    if (compareMode) renderCompareFromDropdowns();
  });
  document.getElementById('compare-b').addEventListener('change', () => {
    if (compareMode) renderCompareFromDropdowns();
  });

  // Compare slider drag
  const compareLine = document.getElementById('compare-line');

  const onCompareMove = (e) => {
    if (!compareDragging || !compareMode) return;
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    compareX = Math.max(0.02, Math.min(0.98, (clientX - rect.left) / rect.width));
    renderCompare();
    updateCompareSliderPosition();
  };

  compareLine.addEventListener('mousedown', (e) => {
    compareDragging = true;
    e.preventDefault();
    e.stopPropagation();
  });
  compareLine.addEventListener('touchstart', (e) => {
    compareDragging = true;
    e.stopPropagation();
  }, { passive: false });
  window.addEventListener('mousemove', onCompareMove);
  window.addEventListener('touchmove', onCompareMove, { passive: false });
  window.addEventListener('mouseup', () => { compareDragging = false; });
  window.addEventListener('touchend', () => { compareDragging = false; });

  // Hide loading screen
  document.getElementById('loading').style.display = 'none';

  // Initial render
  render();
}

// Sidebar toggle
document.getElementById('sidebar-toggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('collapsed');
  document.getElementById('sidebar-toggle').classList.toggle('collapsed');
});

init().catch(err => {
  document.getElementById('load-status').textContent = 'Error: ' + err.message;
  console.error(err);
});
</script>
</body>
</html>
